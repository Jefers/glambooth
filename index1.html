<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#1a0b2e"/>
<!-- === PWA === -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GlamBooth">
<!-- === /PWA === -->
<title>GlamBooth ✨</title>
<style>
  :root{
    --funny:#ff5470; --glam:#39ff9e; --party:#36d6ff; --crazy:#ff45e0;
    --glass:rgba(255,255,255,.14); --glass-b:rgba(255,255,255,.28);
    --ink:#fff; --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
    color:var(--ink);overflow:hidden;background:linear-gradient(135deg,#ff2d78 0%,#a23bff 45%,#23d5ff 100%);display:grid;place-items:center}
  #ambient{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .bit{position:absolute;width:10px;height:14px;background:linear-gradient(180deg,#ffe27a,#d99a16);
    border-radius:2px;opacity:.85;animation:fall linear infinite;filter:drop-shadow(0 0 4px rgba(255,210,90,.6))}
  @keyframes fall{0%{transform:translateY(-10vh) rotate(0)}100%{transform:translateY(110vh) rotate(540deg)}}
  #device{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;background:#0c0518}
  @media(min-width:520px){
    #device{width:min(430px,94vw);height:min(900px,94vh);border-radius:46px;border:10px solid #15101f;
      box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 2px #2a2238 inset}#notch{display:block}}
  #notch{display:none;position:absolute;top:8px;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#000;border-radius:0 0 16px 16px;z-index:40}
  header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:calc(14px + var(--safe-t)) 14px 10px;
    background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.04));backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
  header h1{margin:0;font-size:20px;font-weight:800;letter-spacing:.3px;text-shadow:0 0 18px rgba(255,255,255,.45)}
  .ibtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--glass-b);background:var(--glass);color:#fff;font-size:18px;display:grid;place-items:center;cursor:pointer}
  .ibtn:active{transform:scale(.9)}
  /* === PWA: iOS install banner === */
  #iosBanner{display:none;align-items:center;gap:10px;padding:10px 14px;background:rgba(0,0,0,.55);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-size:13px;font-weight:700;line-height:1.3}
  #iosBanner.on{display:flex}
  #iosBanner .arrow{font-size:20px}
  #iosBanner b{color:var(--glam)}
  #iosBanner button{margin-left:auto;border:1px solid var(--glass-b);background:var(--glass);color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;flex:0 0 auto}
  #stageWrap{flex:1 1 auto;min-height:0;display:grid;place-items:center;padding:8px 12px;position:relative}
  #stage{position:relative;width:100%;max-height:100%;aspect-ratio:3/4;border-radius:26px;overflow:hidden;background:#000;
    box-shadow:0 0 0 1px rgba(255,255,255,.18),0 18px 40px rgba(0,0,0,.45)}
  #stage.nocam{background:linear-gradient(135deg,#ff2d78,#a23bff 50%,#23d5ff)}
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  #mesh{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1);pointer-events:none;z-index:5}
  #nocamMsg{position:absolute;inset:0;display:none;place-items:center;text-align:center;padding:20px;font-weight:700;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.4)}
  #stage.nocam #nocamMsg{display:grid}
  #arPill{position:absolute;top:10px;right:10px;z-index:20}
  #arBtn{display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:999px;font-weight:800;font-size:12px;cursor:pointer;color:#fff;
    border:1px solid var(--glass-b);background:rgba(0,0,0,.4);backdrop-filter:blur(10px)}
  #arBtn.on{border-color:var(--glam);box-shadow:0 0 16px var(--glam)}
  #arBtn .dot{width:8px;height:8px;border-radius:50%;background:#888}
  #arBtn.on .dot{background:var(--glam);box-shadow:0 0 8px var(--glam)}
  #arBtn.loading .dot{background:var(--party);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.3}}
  /* === PWA: install chip === */
  #installChip{position:absolute;top:10px;left:10px;z-index:20;display:none;align-items:center;gap:6px;padding:8px 13px;
    border-radius:999px;font-weight:800;font-size:12px;cursor:pointer;color:#fff;border:1px solid var(--glam);
    background:rgba(0,0,0,.45);backdrop-filter:blur(10px);box-shadow:0 0 16px rgba(57,255,158,.5)}
  #installChip.on{display:flex}
  #installChip:active{transform:scale(.92)}
  .sticker{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);touch-action:none;user-select:none;cursor:grab;
    will-change:transform;filter:drop-shadow(0 4px 8px rgba(0,0,0,.35));z-index:10}
  .sticker.locked{cursor:default}
  .sticker.sel{outline:2px dashed #fff;outline-offset:4px;border-radius:8px}
  .sticker span{display:block}
  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:30}
  #flash.go{animation:flash .42s ease-out}
  @keyframes flash{0%{opacity:.95}100%{opacity:0}}
  #count{position:absolute;inset:0;display:none;place-items:center;z-index:31;pointer-events:none}
  #count b{font-size:120px;font-weight:900;color:#fff;text-shadow:0 0 40px var(--party),0 6px 0 rgba(0,0,0,.25)}
  #count.go{display:grid}#count.go b{animation:pop .9s ease-out}
  @keyframes pop{0%{transform:scale(.2);opacity:0}30%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:0}}
  #controls{padding:6px 12px calc(10px + var(--safe-b));background:linear-gradient(0deg,rgba(0,0,0,.55),rgba(0,0,0,.12));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
  #editbar{display:none;align-items:center;gap:7px;margin-bottom:8px;background:var(--glass);border:1px solid var(--glass-b);border-radius:16px;padding:8px 10px;flex-wrap:wrap}
  #editbar.on{display:flex}
  #editbar .nm{font-weight:700;font-size:13px;margin-right:auto;opacity:.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #editbar button{width:38px;height:38px;border-radius:12px;border:1px solid var(--glass-b);background:rgba(255,255,255,.12);color:#fff;font-size:16px;cursor:pointer}
  #editbar button:active{transform:scale(.9)}
  #editbar button.lock.on{border-color:var(--glam);box-shadow:0 0 12px var(--glam)}
  #tabs{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
  .tab{padding:7px 16px;border-radius:999px;font-weight:800;font-size:13px;cursor:pointer;border:2px solid rgba(255,255,255,.35);background:rgba(255,255,255,.06);color:#fff;transition:.2s}
  .tab[data-c="funny"].on{border-color:var(--funny);box-shadow:0 0 16px var(--funny)}
  .tab[data-c="glam"].on{border-color:var(--glam);box-shadow:0 0 16px var(--glam)}
  .tab[data-c="party"].on{border-color:var(--party);box-shadow:0 0 16px var(--party)}
  .tab[data-c="crazy"].on{border-color:var(--crazy);box-shadow:0 0 16px var(--crazy);animation:throb 1s infinite}
  @keyframes throb{50%{box-shadow:0 0 26px var(--crazy)}}
  #tray{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 10px;scrollbar-width:none}
  #tray::-webkit-scrollbar{display:none}
  .bub{flex:0 0 auto;width:60px;height:60px;border-radius:50%;display:grid;place-items:center;cursor:pointer;
    background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.5),rgba(255,255,255,.12));border:1px solid var(--glass-b);box-shadow:0 6px 16px rgba(0,0,0,.3)}
  .bub:active{transform:scale(.88)}.bub img{width:34px;height:34px;object-fit:contain}.bub span{font-size:30px;line-height:1}
  #shutterRow{display:flex;align-items:center;justify-content:center;gap:22px;margin-top:2px}
  .side{padding:11px 16px;border-radius:999px;font-weight:800;font-size:13px;cursor:pointer;border:2px solid var(--glass-b);background:var(--glass);color:#fff}
  .side:active{transform:scale(.93)}
  #shutter{width:78px;height:78px;border-radius:50%;cursor:pointer;position:relative;
    background:conic-gradient(from 0deg,#ff2d78,#ffb02e,#39ff9e,#36d6ff,#a23bff,#ff45e0,#ff2d78);display:grid;place-items:center;animation:spin 4s linear infinite;box-shadow:0 0 26px rgba(255,255,255,.5)}
  #shutter:active{transform:scale(.92)}
  #shutter i{width:58px;height:58px;border-radius:50%;background:#fff;display:block;box-shadow:0 0 18px #fff inset}
  @keyframes spin{to{transform:rotate(360deg)}}
  #fx{position:fixed;inset:0;pointer-events:none;z-index:60}
  #toast{position:fixed;left:50%;top:18%;transform:translateX(-50%) translateY(-12px);z-index:70;background:rgba(20,8,30,.85);
    border:1px solid var(--glass-b);color:#fff;font-weight:800;padding:10px 18px;border-radius:999px;opacity:0;transition:.3s;backdrop-filter:blur(10px)}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .screen{position:absolute;inset:0;z-index:50;display:none;flex-direction:column;background:#0c0518}
  .screen.on{display:flex}
  .ghead{display:flex;align-items:center;gap:10px;padding:calc(14px + var(--safe-t)) 14px 10px;background:linear-gradient(180deg,rgba(255,255,255,.14),transparent);backdrop-filter:blur(14px)}
  .ghead h2{margin:0;font-size:18px;font-weight:800;flex:1;text-align:center}
  #grid{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-content:start}
  #grid .cell{position:relative;aspect-ratio:3/4;border-radius:14px;overflow:hidden;background:#222;border:1px solid rgba(255,255,255,.15);cursor:pointer}
  #grid .cell img{width:100%;height:100%;object-fit:cover}#grid .cell.strip img{object-position:top}
  #grid .cell .tag{position:absolute;top:6px;left:6px;font-size:10px;font-weight:800;background:rgba(0,0,0,.5);padding:2px 7px;border-radius:8px}
  #empty{margin:auto;text-align:center;opacity:.7;padding:30px}
  #viewer img{flex:1;width:100%;object-fit:contain;background:#000}
  .vbar{display:flex;gap:10px;justify-content:center;padding:12px calc(12px) calc(14px + var(--safe-b));background:linear-gradient(0deg,rgba(0,0,0,.6),transparent)}
  .vbar button{flex:1;max-width:160px;padding:13px;border-radius:14px;font-weight:800;cursor:pointer;border:2px solid var(--glass-b);background:var(--glass);color:#fff}
  .vbar .share{border-color:var(--party);box-shadow:0 0 16px var(--party)}.vbar .save{border-color:var(--glam);box-shadow:0 0 16px var(--glam)}.vbar .del{border-color:var(--funny)}
  #splash{position:absolute;inset:0;z-index:80;display:grid;place-items:center;text-align:center;
    background:radial-gradient(circle at 50% 30%,rgba(255,255,255,.18),rgba(12,5,24,.92));backdrop-filter:blur(8px)}
  #splash .logo{font-size:46px;font-weight:900;letter-spacing:.5px;text-shadow:0 0 30px rgba(255,255,255,.5)}
  #splash p{opacity:.85;max-width:280px;margin:10px auto 26px;line-height:1.5}
  #startBtn{padding:16px 34px;border-radius:999px;border:none;cursor:pointer;font-weight:900;font-size:17px;color:#1a0b2e;
    background:conic-gradient(from 0deg,#ff2d78,#ffb02e,#39ff9e,#36d6ff,#a23bff,#ff2d78);box-shadow:0 0 30px rgba(255,255,255,.5);animation:pulse 1.6s infinite}
  @keyframes pulse{50%{transform:scale(1.05)}}
</style>
</head>
<body>
<div id="ambient"></div>
<canvas id="fx"></canvas>
<div id="toast"></div>
<div id="device">
  <div id="notch"></div>
  <header>
    <button class="ibtn" id="galleryBtn" title="Gallery">🖼️</button>
    <h1>GlamBooth ✨</h1>
    <button class="ibtn" id="clearBtn" title="Clear stickers">🧹</button>
  </header>
  <!-- === PWA: iOS install banner === -->
  <div id="iosBanner">
    <span class="arrow">️</span>
    <span>Install: tap <b>Share</b> ▸ <b>Add to Home Screen</b></span>
    <button id="iosX" title="Dismiss">✕</button>
  </div>
  <div id="stageWrap">
    <div id="stage">
      <video id="video" playsinline muted autoplay></video>
      <canvas id="mesh"></canvas>
      <div id="nocamMsg">📷 No camera<br><span style="font-weight:600;opacity:.85">Stickers still work — play on the gradient!</span></div>
      <div id="flash"></div>
      <div id="count"><b>3</b></div>
      <div id="arPill"><button id="arBtn"><span class="dot"></span><span id="arLbl">AR ✨</span></button></div>
      <!-- === PWA: install chip (Android/Chrome/desktop) === -->
      <button id="installChip">⬇️ Install app</button>
    </div>
  </div>
  <div id="controls">
    <div id="editbar">
      <span class="nm" id="editName">sticker</span>
      <button class="lock" id="bLock" title="Lock to face / free">🔓</button>
      <button id="bSmaller" title="Smaller">➖</button>
      <button id="bBigger" title="Bigger">➕</button>
      <button id="bRotL" title="Rotate left">↺</button>
      <button id="bRotR" title="Rotate right">↻</button>
      <button id="bDup" title="Duplicate">⧉</button>
      <button id="bFront" title="To front">⤒</button>
      <button id="bDel" title="Delete">🗑️</button>
    </div>
    <div id="tabs"></div>
    <div id="tray"></div>
    <div id="shutterRow">
      <button class="side" id="stripBtn">🎞️ 4‑UP</button>
      <div id="shutter"><i></i></div>
      <button class="side" id="galBtn2">🖼️ Gallery</button>
    </div>
  </div>
  <div class="screen" id="gallery">
    <div class="ghead"><button class="ibtn" id="galBack">‹</button><h2>Gallery ✨</h2><button class="ibtn" id="galClear" title="Clear all">🗑️</button></div>
    <div id="grid"></div>
  </div>
  <div class="screen" id="viewer">
    <div class="ghead"><button class="ibtn" id="vBack">‹</button><h2 id="vTitle">Photo</h2><span style="width:42px"></span></div>
    <img id="vImg" alt="capture"/>
    <div class="vbar"><button class="del" id="vDel">Delete</button><button class="save" id="vSave">Save</button><button class="share" id="vShare">Share 🚀</button></div>
  </div>
  <div id="splash">
    <div>
      <div class="logo">GlamBooth ✨</div>
      <p>A silly, glowy photo booth with <b>real face‑tracking AR</b>. Beards, lashes & lipstick lock onto your face and follow you. Strike a pose, roll a strip.</p>
      <button id="startBtn">Tap to Start 📸</button>
    </div>
  </div>
</div>
<script>
"use strict";
const SVG = {
 beard:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100"><path d="M8 34 Q24 12 60 20 Q96 12 112 34 Q96 26 60 30 Q24 26 8 34Z" fill="#5b3313"/><path d="M12 36 Q8 84 60 98 Q112 84 108 36 Q88 56 60 56 Q32 56 12 36Z" fill="#6b3d18"/><path d="M40 60 Q60 72 80 60 Q70 80 60 80 Q50 80 40 60Z" fill="#3f220a" opacity="0.5"/></svg>',
 mustache:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60"><path d="M60 26 Q44 8 14 22 Q6 26 10 34 Q14 28 24 30 Q40 34 50 44 Q56 50 60 40 Q64 50 70 44 Q80 34 96 30 Q106 28 110 34 Q114 26 106 22 Q76 8 60 26Z" fill="#4a2c10"/></svg>',
 lashes:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60"><g stroke="#111" stroke-width="3.5" fill="none" stroke-linecap="round"><path d="M10 40 Q30 22 50 40"/><path d="M70 40 Q90 22 110 40"/><path d="M14 34 L8 22"/><path d="M24 28 L22 14"/><path d="M36 26 L38 12"/><path d="M46 32 L52 20"/><path d="M74 34 L68 22"/><path d="M84 28 L82 14"/><path d="M96 26 L98 12"/><path d="M106 32 L112 20"/></g></svg>',
 lips:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 70"><path d="M8 32 Q30 12 60 26 Q90 12 112 32 Q90 30 60 28 Q30 30 8 32Z" fill="#fb1e56"/><path d="M8 32 Q60 70 112 32 Q60 44 8 32Z" fill="#d10f43"/><path d="M40 22 Q50 18 58 24 Q50 26 40 22Z" fill="#fff" opacity="0.6"/></svg>',
 partyhat:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><polygon points="50,8 8,92 24,92" fill="#ec4899"/><polygon points="50,8 24,92 40,92" fill="#f59e0b"/><polygon points="50,8 40,92 56,92" fill="#22c55e"/><polygon points="50,8 56,92 72,92" fill="#3b82f6"/><polygon points="50,8 72,92 92,92" fill="#a855f7"/><circle cx="50" cy="8" r="8" fill="#fde047"/><ellipse cx="50" cy="92" rx="44" ry="6" fill="#fff" opacity="0.25"/></svg>',
 clownnose:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><radialGradient id="cn" cx="38%" cy="34%" r="70%"><stop offset="0%" stop-color="#ff8a8a"/><stop offset="55%" stop-color="#ef2b2b"/><stop offset="100%" stop-color="#a30d0d"/></radialGradient></defs><circle cx="50" cy="52" r="34" fill="url(#cn)"/><circle cx="40" cy="40" r="9" fill="#fff" opacity="0.7"/></svg>',
 pixelshades:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60"><rect x="6" y="20" width="44" height="26" fill="#111"/><rect x="70" y="20" width="44" height="26" fill="#111"/><rect x="50" y="24" width="20" height="8" fill="#111"/><rect x="6" y="14" width="11" height="8" fill="#ef4444"/><rect x="17" y="14" width="11" height="8" fill="#f59e0b"/><rect x="28" y="14" width="11" height="8" fill="#22c55e"/><rect x="39" y="14" width="11" height="8" fill="#3b82f6"/><rect x="70" y="14" width="11" height="8" fill="#a855f7"/><rect x="81" y="14" width="11" height="8" fill="#ec4899"/><rect x="92" y="14" width="11" height="8" fill="#22d3ee"/><rect x="103" y="14" width="11" height="8" fill="#fde047"/></svg>',
 alieneyes:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 70"><ellipse cx="34" cy="36" rx="20" ry="26" fill="#fff"/><ellipse cx="86" cy="36" rx="20" ry="26" fill="#fff"/><circle cx="36" cy="40" r="12" fill="#16a34a"/><circle cx="84" cy="40" r="12" fill="#16a34a"/><circle cx="38" cy="42" r="6" fill="#000"/><circle cx="82" cy="42" r="6" fill="#000"/><circle cx="32" cy="34" r="3" fill="#fff"/><circle cx="80" cy="34" r="3" fill="#fff"/></svg>',
 hearteyes:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60"><g fill="#ff2d6f"><path d="M30 18 C24 8 8 12 8 26 C8 38 30 50 30 50 C30 50 52 38 52 26 C52 12 36 8 30 18Z"/><path d="M90 18 C84 8 68 12 68 26 C68 38 90 50 90 50 C90 50 112 38 112 26 C112 12 96 8 90 18Z"/></g></svg>',
 sparkles:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80"><path d="M30 8 L34 26 L52 30 L34 34 L30 52 L26 34 L8 30 L26 26Z" fill="#fff700"/><path d="M86 30 L89 42 L101 45 L89 48 L86 60 L83 48 L71 45 L83 42Z" fill="#fff"/><path d="M60 44 L62 54 L72 56 L62 58 L60 68 L58 58 L48 56 L58 54Z" fill="#ffd1ec"/></svg>',
 rainbow:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 70"><g fill="none" stroke-width="8" stroke-linecap="round"><path d="M14 64 A46 46 0 0 1 106 64" stroke="#ef4444"/><path d="M24 64 A36 36 0 0 1 96 64" stroke="#f59e0b"/><path d="M34 64 A26 26 0 0 1 86 64" stroke="#22c55e"/><path d="M44 64 A16 16 0 0 1 76 64" stroke="#3b82f6"/></g></svg>'
};
const dataURL = s => 'data:image/svg+xml,' + encodeURIComponent(s);
const S = (cat,kind,name,art,d)=>({cat,kind,name,art,d});
const STICKERS = [
 S('funny','svg','Beard',SVG.beard,{cx:.5,cy:.74,size:.62}),
 S('funny','svg','Mustache',SVG.mustache,{cx:.5,cy:.64,size:.42}),
 S('funny','svg','Clown Nose',SVG.clownnose,{cx:.5,cy:.52,size:.24}),
 S('funny','svg','Pixel Shades',SVG.pixelshades,{cx:.5,cy:.40,size:.52}),
 S('funny','emoji','Cool Shades','🕶️',{cx:.5,cy:.40,size:.42}),
 S('funny','emoji','Nose','👃',{cx:.5,cy:.52,size:.26}),
 S('funny','emoji','Disguise','🥸',{cx:.5,cy:.5,size:.7}),
 S('funny','emoji','Clown','🤡',{cx:.5,cy:.5,size:.72}),
 S('glam','svg','Drama Lashes',SVG.lashes,{cx:.5,cy:.40,size:.62}),
 S('glam','svg','Red Lips',SVG.lips,{cx:.5,cy:.68,size:.36}),
 S('glam','emoji','Lipstick','💄',{cx:.5,cy:.68,size:.3}),
 S('glam','svg','Sparkles',SVG.sparkles,{cx:.5,cy:.26,size:.62}),
 S('glam','svg','Heart Eyes',SVG.hearteyes,{cx:.5,cy:.38,size:.52}),

 case'mustache':return{x:(F.nose.x+F.mouth.x)/2,y:(F.nose.y+F.mouth.y)/2,w:k*F.eyeDist,rot:F.angle};
 case'beard':return{x:(F.mouth.x+F.chin.x)/2,y:(F.mouth.y+F.chin.y)/2,w:k*F.faceW,rot:F.angle};

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function buildStrip(frames){const fw=720,slotH=Math.round(fw*1024/768),pad=36,gap=28,footer=150;const W=fw+pad*2,H=pad*2+4*slotH+3*gap+footer;
 const c=document.createElement('canvas');c.width=W;c.height=H;const ctx=c.getContext('2d');
 const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#ff2d78');g.addColorStop(.5,'#a23bff');g.addColorStop(1,'#23d5ff');roundRect(ctx,0,0,W,H,40);ctx.fillStyle=g;ctx.fill();
 roundRect(ctx,8,8,W-16,H-16,34);ctx.fillStyle='#fff';ctx.fill();
 frames.forEach((f,i)=>{const x=pad,y=pad+i*(slotH+gap);ctx.save();roundRect(ctx,x,y,fw,slotH,22);ctx.clip();ctx.drawImage(f,x,y,fw,slotH);ctx.restore();
   ctx.save();roundRect(ctx,x,y,fw,slotH,22);ctx.lineWidth=4;ctx.strokeStyle='rgba(0,0,0,.08)';ctx.stroke();ctx.restore();});
 const fy=pad*2+4*slotH+3*gap;ctx.fillStyle='#1a0b2e';ctx.font='900 46px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('GlamBooth ✨',W/2,fy+footer*0.42);
 ctx.fillStyle='#888';ctx.font='600 22px -apple-system,sans-serif';ctx.fillText(new Date().toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}),W/2,fy+footer*0.78);return c;}

function renderGrid(){const g=$('#grid');g.innerHTML='';if(!gallery.length){g.innerHTML='<div id="empty">No shots yet 📸<br>Hit the rainbow shutter!</div>';return;}
 gallery.forEach(item=>{const cell=document.createElement('div');cell.className='cell'+(item.type==='strip'?' strip':'');
   const im=document.createElement('img');im.src=item.dataUrl;cell.appendChild(im);
   const tag=document.createElement('div');tag.className='tag';tag.textContent=item.type==='strip'?'🎞️ STRIP':'📸';cell.appendChild(tag);
   cell.onclick=()=>openViewer(item);g.appendChild(cell);});}
function openGallery(){renderGrid();$('#gallery').classList.add('on');}
function openViewer(item){$('#vImg').src=item.dataUrl;$('#vTitle').textContent=item.type==='strip'?'Your Strip 🎞️':'Photo ✨';$('#viewer').dataset.id=item.id;$('#viewer').classList.add('on');}
$('#galleryBtn').onclick=$('#galBtn2').onclick=openGallery;
$('#galBack').onclick=()=>$('#gallery').classList.remove('on');
$('#galClear').onclick=()=>{if(confirm('Delete all photos?')){gallery=[];renderGrid();toast('Gallery cleared');}};
$('#vBack').onclick=()=>$('#viewer').classList.remove('on');
$('#vDel').onclick=()=>{const id=+$('#viewer').dataset.id;gallery=gallery.filter(x=>x.id!==id);$('#viewer').classList.remove('on');renderGrid();toast('Deleted');};
$('#vShare').onclick=()=>shareItem($('#vImg').src);
$('#vSave').onclick=()=>saveItem($('#vImg').src);
async function shareItem(url){try{const blob=await (await fetch(url)).blob();const file=new File([blob],'glambooth.png',{type:'image/png'});
 if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'GlamBooth ✨'});return;}}catch(e){}saveItem(url);toast('Use Share → Save Image on iPhone');}
function saveItem(url){try{const a=document.createElement('a');a.href=url;a.download='glambooth-'+Date.now()+'.png';document.body.appendChild(a);a.click();a.remove();
 toast('Saved 💾 (on iPhone: long‑press the image → Save)');}catch(e){toast('Long‑press the image to save');}}

$('#shutter').onclick=singleSnap;
$('#stripBtn').onclick=runStrip;

/* === PWA: install prompt + service worker + standalone detection === */
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
let deferredPrompt=null;
const installChip=$('#installChip'), iosBanner=$('#iosBanner');
function refreshInstallUI(){
  if(isStandalone){installChip.classList.remove('on');iosBanner.classList.remove('on');return;}
  if(isIOS){ if(!localStorage.getItem('gb_ioshint')) iosBanner.classList.add('on'); installChip.classList.remove('on'); return; }
  installChip.classList.toggle('on', !!deferredPrompt);
}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;refreshInstallUI();});
window.addEventListener('appinstalled',()=>{deferredPrompt=null;installChip.classList.remove('on');toast('GlamBooth installed ✨');});
installChip.onclick=async()=>{ if(!deferredPrompt)return;
  try{deferredPrompt.prompt();const {outcome}=await deferredPrompt.userChoice;toast(outcome==='accepted'?'Installed! 🎉':'No worries');}catch(e){}
  deferredPrompt=null;installChip.classList.remove('on'); };
$('#iosX').onclick=()=>{iosBanner.classList.remove('on');localStorage.setItem('gb_ioshint','1');};
refreshInstallUI();
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});}
/* === /PWA === */

async function start(){
 try{audio=new (window.AudioContext||window.webkitAudioContext)();if(audio.state==='suspended')audio.resume();}catch(e){}
 $('#splash').style.display='none';
 if(isStandalone) toast('Running installed ✨');   /* === PWA === */
 refreshInstallUI();                               /* === PWA === */
 try{const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:1280}},audio:false});
   video.srcObject=stream;await video.play().catch(()=>{});
 }catch(e){noCam=true;stage.classList.add('nocam');$('#arPill').style.display='none';arOn=false;toast('No camera — party on the gradient! 🎨');}
 buildTabs();buildTray();sizeMesh();paintAll();updatePill();
 if(arOn&&!noCam)ensureAR();
 requestAnimationFrame(tick);
}
$('#startBtn').onclick=start;
addEventListener('keydown',e=>{if(e.code==='Space'&&!$('#splash').offsetParent){e.preventDefault();singleSnap();}});
</script>
